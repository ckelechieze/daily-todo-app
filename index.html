<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <!-- Tailwind Link -->
   <link rel="stylesheet" href="./src/output.css">

   <!-- Font Awesome Link-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <title>Frontend Mentor | Todo app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body class="bg-[#dde3e9]">
  <!-- Container -->
   <section id="app-container" class="bg-[#f6f6f8] mb-12 pb-8 shadow-[8px_8px_15px_rgba(0,0,0,0.15)]">
    <!-- Header -->
    <header id="header" class="h-48 bg-center bg-cover" style="background-image: url('./images/bg-mobile-light.jpg')">
      <!-- Logo/moon-->
       <div class="flex items-start justify-between w-full px-4 py-8">
        <h1 class="text-xl font-bold tracking-[0.4em] text-white">TODO</h1>
        <img id="theme-toggle" class="w-[20px] h-[20px] cursor-pointer" src="./images/icon-moon.svg" alt="">
       </div>
       <!-- New todo-->
       <div id="input-container" class="w-[90%] h-12 bg-white mx-auto rounded-lg flex items-center pl-4 gap-4">
        <div class="w-4 h-4 rounded-full border-2 border-gray-200">
        </div>
        <input 
          id="todo-input"
          type="text"
          placeholder="Create a new todo..."
          class="outline-none w-full text-gray-500"
          >
          <button id="add-button" class="bg-gradient-to-r from-[#803bd0] to-[#7a92f6] text-white font-semibold p-[4px] rounded-lg mr-2">Add</button>
       </div>
    </header>

    <!-- Todo List -->
     <div id="todo-list" class="w-[90%] bg-white mx-auto rounded-lg -mt-10">

     </div>

     <!-- Items left-->
      <div class="flex justify-between p-4 text-gray-400 text-sm">
        <p id="items-left"></p>
        <button id="clear-completed" class="hover:bg-gray-600 bg-[#606de1] text-white font-semibold p-2 rounded-lg">
          Clear Completed
        </button>
      </div>

        <!-- All/Active/Completed Filter-->
         <div id="filter-card" class="flex justify-center items-center gap-8 bg-white w-[90%] mx-auto text-sm py-4 mt-4 font-semibold rounded-lg">
          <p class="filter-btn hover:scale-150 cursor-pointer" id="all-filter">All</p>
          <p class="filter-btn hover:scale-150 cursor-pointer" id="active-filter">Active</p>
          <p class="filter-btn hover:scale-150 cursor-pointer" id="completed-filter">Completed</p>
         </div>

   </section>

   <p class="text-[13px] text-center text-gray-400 my-8">Drag and drop to reorder list</p>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Kelechi Eze</a>.
  </footer>

  <!-- JavaScript -->
   <script>
    //todo arrays
    let todos = JSON.parse(localStorage.getItem("todos")) || [
      {
        text: "Complete online JavaScript course",
        completed: true
      },
      {
        text: "Jog around the park 3x",
        completed: false
      },
      {
        text: "10 minutes meditation",
        completed: false
      },
      {
        text: "Read for 1 hour",
        completed: true
      },
      {
        text: "Pick up groceries",
        completed: false
      },
      {
        text: "Complete Todo App on Frontend Mentor",
        completed: false
      }
    ];

    let filter = "all";
    let darkMode = JSON.parse(localStorage.getItem("darkMode")) || false;
    let draggedIndex = null;

    const addBtn = document.getElementById("add-button");
    const todoInput = document.getElementById("todo-input");
    const clearCompletedBtn = document.getElementById("clear-completed");
    const themeToggle = document.getElementById("theme-toggle");

    const All = document.getElementById("all-filter");
    const Active = document.getElementById("active-filter");
    const Completed = document.getElementById("completed-filter");
    const appContainer = document.getElementById("app-container");
    const header = document.getElementById("header");
    const inputContainer = document.getElementById("input-container");
    const filterCard = document.getElementById("filter-card");


    // Todo render function
    const todoList = document.getElementById("todo-list");

    function renderTodos() {
      todoList.innerHTML = "";

      // For Filtering
      let filteredTodos = todos;

      if (filter === "active") {
        filteredTodos = todos.filter(todo => !todo.completed);
      }

      if (filter === "completed") {
        filteredTodos = todos.filter(todo => todo.completed);
      }

      filteredTodos.forEach((todo, index) => {
      const todoEl = document.createElement("div");
      todoEl.draggable = true;
      todoEl.classList.add("cursor-move");
      
      // dragging a todo
      todoEl.addEventListener("dragstart", () => {
        draggedIndex = index;
        console.log(draggedIndex);
      });

      // dropping a todo on another todo
      todoEl.addEventListener("dragover", (e) => {
        e.preventDefault();
        todoEl.classList.add("bg-white/50");
      })
      todoEl.addEventListener("drop", () => {
        const draggedTodo = todos.splice(draggedIndex, 1)[0];

        todos.splice(index, 0, draggedTodo);

        saveTodos();
        renderTodos();
      });

      todoEl.innerHTML = `
      <div class="flex items-center justify-between px-2 gap-6 pt-6 ${darkMode ? "bg-[#25273c]" : "bg-white"}">
        <div class="flex items-center gap-4 shrink-0 min-w-0 flex-1">
          <div class="todo-check flex w-8 h-8 rounded-full border-2 border-gray-200 items-center justify-center
          ${todo.completed 
          ? 'bg-gradient-to-b from-[#79b4fb] to-[#803bd0] text-white' 
          : 'border-2 border-gray-200'}
          ">
          ${todo.completed ? '<i class="fa-solid fa-check"></i>' : ''}
          </div>
          <p class="min-w-0 flex-1 ${
          todo.completed 
          ? 'line-through text-gray-400' 
          : darkMode
          ? "text-white"
          : "text-black"
          }">
            ${todo.text}</p>
        </div>
        <i class="delete-button fa-solid fa-x text-gray-400">
        </i>
      </div>
      <hr class="border-t ${
      darkMode ? "border-gray-700" : "border-gray-300"
      } w-full mx-auto mt-4">
      `;

      //clicking on checkBtn
      const checkBtn = todoEl.querySelector(".todo-check");

      checkBtn.addEventListener("click", () => {
        todo.completed =!todo.completed;
        saveTodos();
        renderTodos();
      });

      //clicking on cancel button
      const deleteBtn = todoEl.querySelector(".delete-button");

      deleteBtn.addEventListener("click", () => {
      todos = todos.filter(t => t !== todo);
      saveTodos();
      renderTodos();
      });

      todoList.appendChild(todoEl);
    });

     // Items left
      const itemsLeft = document.getElementById("items-left");
      itemsLeft.textContent = todos.filter(todo => !todo.completed).length + " items left";

      updateFilterColor();

  }

  renderTodos();
  themeChange();

  //adding new todos
  function addTodos() {
    if (todoInput.value.trim() === "") return;

    todos.push({
        text: todoInput.value,
        completed: false
      });
      saveTodos();

      todoInput.value = "";
      renderTodos();
      }

      todoInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          addTodos();
        }
      });

      addBtn.addEventListener("click", addTodos);

      //clicking on Clear completed
      clearCompletedBtn.addEventListener("click", () => {
        todos = todos.filter(todo => !todo.completed);

        saveTodos();
        renderTodos();
      });

      // Local storage Function
      function saveTodos() {
        localStorage.setItem("todos", JSON.stringify(todos));
      }
    
     All.addEventListener("click", () => {
       filter = "all";
       console.log(filter);
       renderTodos();
     });

     Active.addEventListener("click", () => {
       filter = "active";
       renderTodos();
     });

     Completed.addEventListener("click", () => {
       filter = "completed";
       renderTodos();
     });

     // Updating filter color
     function updateFilterColor() {
      const filterBtns = document.querySelectorAll(".filter-btn");

      filterBtns.forEach(btn => {
        btn.classList.remove("text-blue-400");
        btn.classList.add("text-gray-400");
      });

      if (filter === "all") {
        All.classList.replace("text-gray-400", "text-blue-400");
      }

      if (filter === "active") {
        Active.classList.replace("text-gray-400", "text-blue-400");
      }

      if (filter === "completed") {
        Completed.classList.replace("text-gray-400", "text-blue-400");
      }
     }
    
     updateFilterColor();

     // Function for changing theme
     function themeChange() {
      if (darkMode) {
        document.body.classList.remove("bg-[#dde3e9]");
        document.body.classList.add("bg-[#161722]");

        todoInput.classList.remove("text-gray-500");
        todoInput.classList.add("text-white");
        todoInput.classList.add("placeholder:text-gray-500");

        filterCard.classList.remove("bg-white");
        filterCard.classList.add("bg-[#25273c]");

        appContainer.classList.remove("bg-[#f6f6f8]");
        appContainer.classList.add("bg-[#161722]");

        inputContainer.classList.remove("bg-white");
        inputContainer.classList.add("bg-[#25273c]");

        todoList.classList.remove("bg-white");
        todoList.classList.add("bg-[#25273c]");

        header.style.backgroundImage =
          "url('./images/bg-mobile-dark.jpg')";
        themeToggle.src = "./images/icon-sun.svg";

      } else {
        document.body.classList.remove("bg-[#161722]");
        document.body.classList.add("bg-[#dde3e9]");
        todoInput.classList.remove("text-white");
        todoInput.classList.add("text-gray-500");
        todoInput.classList.remove("placeholder:text-gray-500");

        appContainer.classList.remove("bg-[#161722]");
        appContainer.classList.add("bg-[#f6f6f8]");

        inputContainer.classList.remove("bg-[#25273c]");
        inputContainer.classList.add("bg-white");

        filterCard.classList.remove("bg-[#25273c]");
        filterCard.classList.add("bg-white");

        todoList.classList.remove("bg-[#25273c]");
        todoList.classList.add("bg-white");

        header.style.backgroundImage =
          "url('./images/bg-mobile-light.jpg')";
        themeToggle.src = "./images/icon-moon.svg";
      }
     }

     themeToggle.addEventListener("click", () => {
      darkMode = !darkMode;
      localStorage.setItem("darkMode", JSON.stringify(darkMode));
      themeChange();
      renderTodos();
     })

   </script>
</body>
</html>
